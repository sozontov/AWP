version: '3.8'

services:
  amnezia_panel:
    image: ghcr.io/sozontov/awp:1.4.4
    container_name: amnezia_panel

    ports:
      - "${APP_PORT:-5000}:5000"

    # Set SECRET_KEY to keep user sessions valid across container recreation.
    # If unset, the panel persists a generated key to the data volume instead.
    environment:
      - SECRET_KEY=${SECRET_KEY:-}

    volumes:
      - amnezia_data:/app/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.connect(('localhost', 5000)); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  amnezia_data:
